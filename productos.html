<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tork - Productos</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <a href="index.html">
                <img src="public/assets/logos/logo.png" alt="Logo de Tork" class="logo-image">
            </a>
        </header>
        <nav class="top-nav">
            <a href="categorias.html" class="back-button" id="regresarBtn">
                <img src="public/assets/icon/boton regresar blanco.svg" alt="Regresar" class="fab-icon-img">
            </a>
            <h1 class="nav-title" id="cat-title">Productos</h1>
        </nav>
        <main class="content">
            <div id="products-grid" style="display: flex; flex-direction: column; gap: 15px; padding: 20px;">
                <!-- Contenido generado por JS -->
            </div>
        </main>
        <footer class="main-footer">
            <img src="public/assets/logos/logo-essity.png" alt="Logo de Essity" class="essity-logo-image">
        </footer>
    </div>

    <script src="js/common.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const catId = urlParams.get('cat');
        const showParam = urlParams.get('show');
        const noBack = urlParams.get('nb') === '1' || !!showParam;

        if (noBack) {
            const btn = document.getElementById('regresarBtn');
            if (btn) btn.style.display = 'none';
            const logoLink = document.querySelector('.main-header a');
            if (logoLink) {
                logoLink.onclick = (e) => e.preventDefault();
                logoLink.style.cursor = 'default';
            }
        }

        fetch('public/catalog.json')
            .then(res => res.json())
            .then(data => {
                const category = data.categorias.find(c => c.id === catId) || data.categorias[0];
                
                if (category) {
                    document.getElementById('cat-title').textContent = category.nombre;
                    const grid = document.getElementById('products-grid');
                    
                    const productFilters = {};
                    const showParam = urlParams.get('show');
                    const allowedProductsMeta = showParam ? showParam.split(';') : null;

                    if (allowedProductsMeta) {
                        allowedProductsMeta.forEach(item => {
                            const dotIndex = item.indexOf('.');
                            if (dotIndex === -1) return;
                            const pid = item.substring(0, dotIndex);
                            const variantString = item.substring(dotIndex + 1);
                            
                            productFilters[pid] = {
                                variants: variantString && variantString !== '' ? variantString : null
                            };
                        });
                    }

                    category.productos.forEach(prod => {
                        if (allowedProductsMeta && !productFilters[prod.id]) return;

                        const card = document.createElement('a');
                        
                        let viewerUrl = `viewer.html?id=${prod.id}`;
                        const filter = productFilters[prod.id];
                        if (filter) {
                            if (filter.variants) viewerUrl += `&v=${encodeURIComponent(filter.variants)}`;
                            if (filter.buy) viewerUrl += `&buy=${encodeURIComponent(filter.buy)}`;
                        }
                        
                        // Arrastrar parámetros de configuración (nb) y UTMs
                        ['nb', 'utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'].forEach(p => {
                            if (urlParams.has(p)) {
                                const sep = viewerUrl.includes('?') ? '&' : '?';
                                viewerUrl += `${sep}${p}=${encodeURIComponent(urlParams.get(p))}`;
                            }
                        });

                        card.href = viewerUrl;
                        card.style.cssText = "display: flex; align-items: center; background: white; border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-decoration: none; color: #333;";
                        
                        const thumbSrc = prod.thumbnail || 'public/assets/images/image.png';
                        
                        card.innerHTML = `
                            <div style="width: 60px; height: 60px; background: #fff; border: 1px solid #eee; border-radius: 4px; margin-right: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                                <img src="${thumbSrc}" style="width: 100%; height: 100%; object-fit: contain;" onerror="this.src='public/assets/images/image.png'">
                            </div>
                            <div style="flex: 1; padding-right: 15px;">
                                <div style="font-weight: bold; margin-bottom: 4px;">${prod.nombre}</div>
                                <div style="font-size: 0.8rem; color: #666;">Ver diseños</div>
                            </div>
                            <i class="fa-solid fa-chevron-right" style="color: #ccc;"></i>
                        `;
                        grid.appendChild(card);
                    });
                }
            });
    </script>
</body>
</html>
