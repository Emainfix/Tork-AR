<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tork - Inicio</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <img src="public/assets/logos/logo.png" alt="Logo de Tork" class="logo-image">
        </header>
        <main class="content" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 40px; text-align: center;">
            <div style="padding: 0 20px;">
                <h2 style="color: var(--dark-blue); font-size: 22px; margin-bottom: 15px; font-weight: 700;">Elige el sistema de higiene ideal para tu negocio</h2>
                <p style="color: var(--text-blue); font-size: 16px;">Coloca el sistema que deseas sobre los espacios de tu negocio</p>
            </div>

            <div class="action-buttons" style="width: 100%; max-width: 320px; gap: 20px;">
                <a href="categorias.html" class="btn btn-primary" style="text-decoration: none;">
                    Conozco los sistemas
                </a>
                <button class="btn btn-outline" disabled style="opacity: 0.6; cursor: not-allowed;">
                    Quiero una recomendación
                </button>
            </div>
        </main>
        <footer class="main-footer">
            <img src="public/assets/logos/logo-essity.png" alt="Logo de Essity" class="essity-logo-image">
        </footer>
    </div>
    <script src="js/common.js"></script>
</body>
</html>
