<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tork - Inicio</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <a href="index.html" class="image-wrapper" style="height: 35px; width: auto;">
                <div class="loader-container"><div class="loading-spinner spinner-small"></div></div>
                <img src="public/assets/logos/logo.png" alt="Logo de Tork" class="logo-image" onload="this.previousElementSibling.classList.add('hidden')">
            </a>
        </header>
        <main class="content index-main">
            <div class="index-text">
                <h2 class="index-title">Elige el sistema de higiene ideal para tu negocio</h2>
                <p class="index-subtitle">Coloca el sistema que deseas sobre los espacios de tu negocio</p>
            </div>

            <div class="action-buttons index-buttons">
                <a href="categorias.html" class="btn btn-primary btn-home">
                    Ver sistemas
                </a>
                <button class="btn btn-outline btn-home" disabled>
                    Ayúdame a elegir
                </button>
            </div>
        </main>
        <footer class="main-footer">
            <img src="public/assets/logos/logo-essity.png" alt="Logo de Essity" class="essity-logo-image">
        </footer>
    </div>
    <script src="js/common.js"></script>
</body>
</html>
