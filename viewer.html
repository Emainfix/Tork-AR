<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tork - Visor de Producto</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Three.js and Loaders for AR -->
    <script src="js/common.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>
    <div class="app-container">
        
        <!-- Header -->
        <header class="main-header">
            <a href="index.html" class="image-wrapper" style="height: 35px; width: auto; display: block; margin: 0 auto; text-decoration: none;">
                <div class="loader-container"><div class="loading-spinner spinner-small"></div></div>
                <img src="public/assets/logos/logo.png" alt="Logo de Tork" class="logo-image" onload="this.previousElementSibling.classList.add('hidden')">
            </a>
        </header>

        <!-- Navigation Bar -->
        <nav class="top-nav">
            <button class="back-button">
                <img src="public/assets/icon/boton regresar blanco.svg" alt="Regresar" class="fab-icon-img">
            </button>
            <h1 class="nav-title" id="nav-title">Cargando...</h1>
        </nav>

        <!-- Main Content -->
        <main class="content">
            
            <h2 class="product-title" id="product-title">---</h2>

            <div class="product-image-container">
                <!-- Loading Spinner -->
                <div id="main-loader" class="loader-container">
                    <div class="loading-spinner"></div>
                </div>

                <model-viewer id="product-viewer" src="" ios-src="" alt="Tork Dispensador" class="product-image" disable-pan camera-controls shadow-intensity="0.0" disable-zoom ar ar-placement="wall" ar-modes="webxr scene-viewer quick-look" camera-orbit="-18deg 78deg auto" min-camera-orbit="auto 0deg auto" max-camera-orbit="auto 100deg auto" style="background-color: unset">
                    <button slot="hotspot-dot+X-Y+Z" class="dot hide" data-position="0 0 0" data-normal="1 0 0"></button>
                    <button slot="hotspot-dim+X-Y" class="dim hide" data-position="0 0 0" data-normal="1 0 0"></button>
                    <button slot="hotspot-dot+X-Y-Z" class="dot hide" data-position="0 0 0" data-normal="1 0 0"></button>
                    <button slot="hotspot-dim+X-Z" class="dim hide" data-position="0 0 0" data-normal="1 0 0"></button>
                    <button slot="hotspot-dot+X+Y-Z" class="dot hide" data-position="0 0 0" data-normal="0 1 0"></button>
                    <button slot="hotspot-dim+Y-Z" class="dim hide" data-position="0 0 0" data-normal="0 1 0"></button>
                    <button slot="hotspot-dot-X+Y-Z" class="dot hide" data-position="0 0 0" data-normal="0 1 0"></button>
                    <button slot="hotspot-dim-X-Z" class="dim hide" data-position="0 0 0" data-normal="-1 0 0"></button>
                    <button slot="hotspot-dot-X-Y-Z" class="dot hide" data-position="0 0 0" data-normal="-1 0 0"></button>
                    <button slot="hotspot-dim-X-Y" class="dim hide" data-position="0 0 0" data-normal="-1 0 0"></button>
                    <button slot="hotspot-dot-X-Y+Z" class="dot hide" data-position="0 0 0" data-normal="-1 0 0"></button>
                    
                    <svg id="dimLines" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" class="dimensionLineContainer hide">
                        <line class="dimensionLine"></line>
                        <line class="dimensionLine"></line>
                        <line class="dimensionLine"></line>
                        <line class="dimensionLine"></line>
                        <line class="dimensionLine"></line>
                    </svg>
                </model-viewer>

                <div class="fab-container">
                    <div class="fab-menu" id="fab-menu">
                        <!-- Primary Menu -->
                        <div id="menu-level-1" class="menu-level">
                            <div class="fab-item">
                                <button class="fab-action" id="btn-info">
                                    <img src="public/assets/icon/info.svg" alt="Materiales" class="fab-icon-img">
                                </button>
                                <span class="fab-label">Info</span>
                            </div>
                            <div class="fab-item">
                                <button class="fab-action" id="btn-entornos">
                                    <img src="public/assets/icon/entornos.svg" alt="Materiales" class="fab-icon-img">
                                </button>
                                <span class="fab-label">Entornos</span>
                            </div>
                        </div>

                        <!-- Secondary Menu -->
                        <div id="menu-level-2" class="menu-level hidden">
                            <div class="fab-item">
                                <button class="fab-action" id="btn-detalles">
                                    <img src="public/assets/icon/detalles.svg" alt="Materiales" class="fab-icon-img">
                                </button>
                                <span class="fab-label">Detalles</span>
                            </div>
                            <div class="fab-item">
                                <button class="fab-action" id="btn-tutorial">
                                    <img src="public/assets/icon/tutorial.svg" alt="Tutorial" class="fab-icon-img">
                                </button>
                                <span class="fab-label">Tutorial</span>
                            </div>
                            <div class="fab-item">
                                <button class="fab-action" id="btn-medidas">
                                    <img src="public/assets/icon/medidas.svg" alt="Medidas" class="fab-icon-img" id="medidas-icon">
                                    <img src="public/assets/icon/cruz.svg" alt="Cerrar" class="fab-icon-img" id="medidas-icon-close" style="display: none; filter: brightness(0) invert(1);">
                                </button>
                                <span class="fab-label" id="medidas-label">Medidas</span>
                            </div>
                        </div>

                        <!-- Tertiary Menu -->
                        <div id="menu-level-3" class="menu-level hidden">
                            <div class="fab-item">
                                <button class="fab-action fab-env-thumb" data-env="fondo1">
                                    <img src="public/assets/images/madera.jpg" alt="Madera" class="env-thumb-img">
                                </button>
                                <span class="fab-label">Madera</span>
                            </div>
                            <div class="fab-item">
                                <button class="fab-action fab-env-thumb" data-env="fondo2">
                                    <img src="public/assets/images/marmol.jpg" alt="Mármol" class="env-thumb-img">
                                </button>
                                <span class="fab-label">Mármol</span>
                            </div>
                            <div class="fab-item">
                                <button class="fab-action fab-env-thumb" data-env="fondo3">
                                    <img src="public/assets/images/ladrillo.jpg" alt="Ladrillo" class="env-thumb-img">
                                </button>
                                <span class="fab-label">Ladrillo</span>
                            </div>
                        </div>
                    </div>
                    <button class="add-button" id="toggle-fab">
                        <i class="fa-solid fa-ellipsis" id="fab-icon-plus"></i>
                        <img src="public/assets/icon/cruz.svg" alt="Cerrar" class="fab-icon-img" id="fab-icon-close" style="display: none;">
                    </button>
                    <span class="fab-main-label">Ver más</span>
                </div>
            </div>

            <div class="product-details">
                <div class="traffic-info">
                    <img src="public/assets/icon/Personas2.png" alt="Personas" class="traffic-icon-img" id="traffic-icon">
                    <span id="traffic-label">Tráfico: alto</span>
                </div>
                
                <hr class="separator">

                <div class="options-section">
                    <h3 class="section-title">Color del dispensador:</h3>
                    <div class="color-options" id="color-options-container">
                        <!-- Se genera dinámicamente -->
                    </div>
                </div>

                <div class="options-section">
                    <h3 class="section-title">Diseño:</h3>
                    <div class="design-thumbnails" id="design-thumbnails-container">
                        <!-- Se genera dinámicamente -->
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-outline" id="btn-ar">
                        <img src="public/assets/icon/ar.svg" alt="Materiales" class="fab-icon-img">
                        Ver en vivo
                    </button>
                    <button class="btn btn-primary" id="btn-buy">
                        <img src="public/assets/icon/rayo.svg" alt="Materiales" class="fab-icon-img">
                        Compra ya
                    </button>
                </div>

                <div class="details-section">
                    <h3 class="section-title details-title">Detalles:</h3>
                    <p class="description" id="product-description">---</p>
                </div>
            </div>

        </main>

        <!-- Footer -->
        <footer class="main-footer">
            <div class="footer-logo">
                <img src="public/assets/logos/logo-essity.png" alt="Logo de Essity" class="essity-logo-image">
            </div>
        </footer>

        <!-- Details Card Overlay -->
        <div id="details-overlay" class="details-overlay hidden">
            <div class="details-card-container">
                <div class="details-card">
                    <button id="details-close" class="details-close-btn"><i class="fa-solid fa-xmark"></i></button>
                    <div id="detailsCarousel" class="details-carousel">
                        <div class="carousel-inner" id="details-carousel-inner"></div>
                        <button class="carousel-control-prev" id="details-prev"><i class="fa-solid fa-chevron-left"></i></button>
                        <button class="carousel-control-next" id="details-next"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                    <div class="details-indicators" id="details-indicators"></div>
                </div>
            </div>
        </div>

        <!-- Tutorial Overlay -->
        <div id="tutorial-overlay" class="tutorial-overlay hidden">
            <div class="tutorial-container">
                <button id="tutorial-close" class="details-close-btn"><i class="fa-solid fa-xmark"></i></button>
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed/3J1tc1fT32w" frameborder="0" allowfullscreen class="video-iframe"></iframe>
                </div>
            </div>
        </div>

        <!-- Onboarding Overlay -->
        <div id="onboarding-overlay" class="onboarding-overlay hidden">
            <div id="onboarding-spotlight" class="onboarding-spotlight"></div>
            <div id="onboarding-card" class="onboarding-card">
                <p id="onboarding-text">Bienvenido al visor de productos de Tork.</p>
                <div class="onboarding-footer">
                    <span id="onboarding-step-indicator">1 / 3</span>
                    <button id="onboarding-next" class="btn-onboarding">Siguiente</button>
                </div>
            </div>
            <button id="onboarding-skip" class="onboarding-skip">Saltar tutorial</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
