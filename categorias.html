<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tork - Sistemas Tork</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <a href="index.html">
                <img src="public/assets/logos/logo.png" alt="Logo de Tork" class="logo-image">
            </a>
        </header>
        <nav class="top-nav">
            <a href="index.html" class="back-button">
                <img src="public/assets/icon/boton regresar blanco.svg" alt="Regresar" class="fab-icon-img">
            </a>
            <h1 class="nav-title">Sistemas Tork</h1>
        </nav>
        <main class="content" style="padding: 0;">
            <div id="categories-grid" class="category-list">
                <!-- Contenido generado por JS -->
            </div>
        </main>
        <footer class="main-footer">
            <img src="public/assets/logos/logo-essity.png" alt="Logo de Essity" class="essity-logo-image">
        </footer>
    </div>

    <script src="js/common.js"></script>
    <script>
        fetch('public/catalog.json')
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById('categories-grid');
                data.categorias.forEach(cat => {
                    const item = document.createElement('a');
                    item.href = `productos.html?cat=${cat.id}`;
                    item.className = "category-item";
                    item.innerHTML = `
                        <div class="category-icon-wrapper">
                            <img src="${cat.thumbnail || 'public/assets/images/placeholder.jpg'}" class="category-icon" onerror="this.src='public/assets/images/placeholder.jpg'">
                        </div>
                        <span class="category-name">${cat.nombre}</span>
                        <i class="fa-solid fa-chevron-right chevron"></i>
                    `;
                    grid.appendChild(item);
                });
            });
    </script>
</body>
</html>
